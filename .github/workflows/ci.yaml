name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  RUSTDOCFLAGS: "-Dwarnings"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: setup Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-machete
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-deny

      - name: Build
        run: cargo build --all-targets

      - name: Run tests
        run: |
          cargo test
          cargo test --all-features
          cd macros
          cargo test

      - name: Clippy
        run: cargo clippy --all-targets --all-features --no-deps

      - name: Fmt
        run: cargo fmt --all -- --check

      - name: Doc
        run: |
          cargo doc --all-features --no-deps
          cd macros
          cargo doc --all-features --no-deps

      - name: Unused dependencies
        run: cargo machete

      - name: Check dependencies licences are compatible
        run: cargo deny check licenses
